        if (window.Telegram && window.Telegram.WebApp) {

    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        /* បង្ខំឱ្យប្រអប់ជ្រើសរើស និង Option ទាំងអស់ប្រើប្រាស់ Font Kantumruy Pro */
        select, option, input, button {
            font-family: 'Kantumruy Pro', sans-serif !important;
        }
        
        /* របារអូស Category ឱ្យទន់ល្មើយ និងងាយស្រួលអូសលើទូរស័ព្ទ */
        .category-scroll-container {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; 
        }
        .category-scroll-container::-webkit-scrollbar {
            display: none; 
        }

        .category-btn.active {
            background-color: #111827;
            color: white;
            border-color: #111827;
        }

        .category-section-title {
            position: sticky;
            top: 110px;
            z-index: 20;
            background-color: #f3f4f6;
            padding: 8px 0;
        }

        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-zoom { animation: zoomIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }

        /* លាក់របារអូសសម្រាប់ Preview Slider */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

    <script>
        // Google Sheet Config
        const SHEET_ID = '1T0401xemiyUKa4i0Okhx525XA9ARl7j7TwUQLaLVJAA'; 
        const SHEET_NAME = 'Sheet1'; 

        let rawData = []; 
        let groupedData = []; 
        let previewImagesList = [];
        let currentImgIndex = 0;

        // មុខងារបង្កើត ID សុវត្ថិភាពពីប្រភេទផលិតផលជាភាសាខ្មែរ ដោយបម្លែងជាលក្ខណៈ Hash
        function getSafeId(text) {
            if (!text) return 'cat-default';
            let hash = 0;
            const cleanText = text.toString().trim();
            for (let i = 0; i < cleanText.length; i++) {
                hash = cleanText.charCodeAt(i) + ((hash << 5) - hash);
            }
            return 'cat-' + Math.abs(hash).toString(16);
        }

        // មុខងារកែតម្រូវតំណភ្ជាប់រូបភាព Google Drive ឱ្យបង្ហាញផ្ទាល់
        function formatImageUrl(url) {
            if (!url) return '';
            let cleanUrl = url.trim();
            
            if (cleanUrl.includes('drive.google.com')) {
                let id = '';
                if (cleanUrl.includes('id=')) {
                    id = cleanUrl.split('id=')[1].split('&')[0];
                } else if (cleanUrl.includes('/file/d/')) {
                    id = cleanUrl.split('/file/d/')[1].split('/')[0];
                }
                if (id) {
                    return `https://docs.google.com/uc?export=download&id=${id}`;
                }
            }
            return cleanUrl;
        }

        async function fetchProducts() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                const csvText = await response.text();
                const sheetData = csvToJson(csvText);

                if (sheetData.length > 0) {
                    rawData = sheetData.map((row, index) => {
                        const rawImg = row['image link'] || row['imagelink'] || '';
                        const rawImg1 = row['image link1'] || row['imagelink1'] || '';
                        const rawImg2 = row['image link2'] || row['imagelink2'] || '';
                        
                        const mainImg = formatImageUrl(rawImg) || 'https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image';
                        const extraImg1 = formatImageUrl(rawImg1);
                        const extraImg2 = formatImageUrl(rawImg2);
                        
                        // បង្កើតបញ្ជីរូបភាពដែលត្រឹមត្រូវទាំងអស់ (ដកចោលលីងទទេរ)
                        const imgs = [mainImg];
                        if (extraImg1) imgs.push(extraImg1);
                        if (extraImg2) imgs.push(extraImg2);

                        return {
                            code: row['code'] ? row['code'].toString().trim() : index.toString(),
                            gcode: (row['g-code'] && row['g-code'].trim() !== '') ? row['g-code'].trim() : null, 
                            name: row['product name'] || row['productname'] || 'ទំនិញគ្មានឈ្មោះ',
                            cat: (row['category'] || 'ផ្សេងៗ').trim().replace(/[\r\n]+/g, ' '), 
                            img: mainImg,
                            imgs: imgs,
                            variant: row['variant/size'] || row['variant'] || ''
                        };
                    });
                    
                    groupProducts();
                    generateCategoryButtons();
                    renderBySections();
                }
            } catch (error) {
                console.error("Error:", error);
                showToast("បញ្ហាទាញទិន្នន័យ សូមពិនិត្យមើលការចែករំលែក Google Sheet", true);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function groupProducts() {
            const groups = {};
            rawData.forEach(item => {
                const gkey = item.gcode ? `G-${item.gcode}` : `S-${item.code}`;
                if (!groups[gkey]) {
                    groups[gkey] = {
                        gkey: gkey,
                        isGroup: !!item.gcode,
                        baseName: item.name, 
                        cat: item.cat,
                        variants: []
                    };
                }
                groups[gkey].variants.push(item);
            });
            groupedData = Object.values(groups);
        }

        function generateCategoryButtons() {
            const catList = document.getElementById('category-list');
            catList.innerHTML = `<button onclick="scrollToCat('all', this)" class="category-btn active px-4 py-1.5 rounded-full text-xs font-medium border bg-white text-gray-600 whitespace-nowrap shadow-sm" data-cat="all">ទាំងអស់</button>`;
            
            const categories = [...new Set(rawData.map(item => item.cat))];
            
            categories.forEach(cat => {
                if (cat && cat !== 'ផ្សេងៗ') {
                    const btn = document.createElement('button');
                    btn.className = "category-btn px-4 py-1.5 rounded-full text-xs font-medium border bg-white text-gray-600 whitespace-nowrap shadow-sm";
                    btn.innerText = cat;
                    btn.setAttribute('data-cat', getSafeId(cat)); 
                    btn.onclick = (e) => scrollToCat(cat, e.target);
                    catList.appendChild(btn);
                }
            });
        }

        // ប្រព័ន្ធបំលែង CSV ទៅជា JSON យ៉ាងមានលំនឹង និងត្រឹមត្រូវតាមស្ដង់ដារ RFC 4180
        function csvToJson(csv) {
            const lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < csv.length; i++) {
                let c = csv[i];
                let next = csv[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }

            if (lines.length === 0) return [];

            const headers = lines[0].map(h => h.replace(/"/g, '').trim().toLowerCase()); 
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i];
                if (currentLine.length === 0 || (currentLine.length === 1 && currentLine[0] === '')) continue;
                
                let obj = {};
                headers.forEach((header, index) => {
                    if (currentLine[index] !== undefined) {
                        obj[header] = currentLine[index].replace(/"/g, '').trim();
                    }
                });
                result.push(obj);
            }
            return result;
        }

        function renderBySections(searchQuery = '') {
            const container = document.getElementById('products-container');
            const noRes = document.getElementById('no-results');
            container.innerHTML = '';
            
            const categories = [...new Set(groupedData.map(g => g.cat))];
            let hasResults = false;

            categories.forEach(cat => {
                const items = groupedData.filter(g => 
                    g.cat === cat && 
                    (g.variants.some(v => 
                        v.name.toLowerCase().includes(searchQuery) || 
                        v.code.toString().toLowerCase().includes(searchQuery) ||
                        (v.gcode && v.gcode.toString().toLowerCase().includes(searchQuery)) ||
                        v.variant.toLowerCase().includes(searchQuery)
                    ))
                );

                if (items.length > 0) {
                    hasResults = true;
                    const section = document.createElement('section');
                    section.id = `section-${getSafeId(cat)}`; 
                    section.className = "scroll-mt-[160px]";
                    section.innerHTML = `
                        <div class="category-section-title">
                            <h2 class="text-sm font-bold text-gray-800 border-l-4 border-red-500 pl-2">${cat}</h2>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            ${items.map(g => renderProductCard(g)).join('')}
                        </div>
                    `;
                    container.appendChild(section);
                }
            });

            if (!hasResults) noRes.classList.remove('hidden');
            else noRes.classList.add('hidden');
        }

        function renderProductCard(g) {
            const firstVar = g.variants[0];
            const hasMultiple = g.variants.length > 1;

            return `
            <div id="card-${g.gkey}" data-selected-code="${firstVar.code}" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden group transition-all duration-300 flex flex-col justify-between">
                
                <div class="relative h-28 sm:h-36 bg-gray-100 cursor-pointer overflow-hidden" onclick="openPreview('${g.gkey}')">
                    <img src="${firstVar.img}" id="img-${g.gkey}" class="w-full h-full object-cover group-hover:scale-105 transition-transform" onerror="this.src='https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image'">
                    <div class="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-magnifying-glass-plus text-white text-xl drop-shadow-md"></i>
                    </div>
                </div>
                <div class="p-2 flex flex-col justify-between flex-grow">
                    <div class="mb-1">
                        <h3 id="name-${g.gkey}" class="text-[11px] font-semibold text-gray-800 line-clamp-2 leading-tight h-8">${firstVar.name}</h3>
                    </div>
                    <div class="mt-1 ${hasMultiple ? '' : 'invisible h-7'}">
                        ${hasMultiple ? `
                        <select onchange="handleDropdownChange('${g.gkey}', this)" id="select-${g.gkey}" class="w-full text-[10px] bg-red-50 border border-red-200 text-red-700 rounded-lg py-1 px-2 outline-none font-bold cursor-pointer hover:bg-red-100 transition-colors shadow-sm appearance-none pr-6 relative" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23b91c1c%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 8px top 50%; background-size: 8px auto;">
                            <option value="" disabled selected class="text-gray-500">🔍 ជម្រើសផ្សេងទៀត...</option>
                            ${g.variants.map(v => {
                                const displayText = `${v.name} [${v.code}]`;
                                return `<option value="${v.code}" ${v.code === firstVar.code ? 'class="hidden"' : ''} class="text-gray-800 font-medium py-1 text-[10px]">${displayText}</option>`;
                            }).join('')}
                        </select>` : `<input type="hidden" id="select-${g.gkey}" value="${firstVar.code}">`}
                    </div>
                </div>
            </div>`;
        }

        function handleDropdownChange(gkey, selectEl) {
            const selectedCode = selectEl.value;
            if (!selectedCode) return;

            updateVariantDisplay(gkey, selectedCode);

            const card = document.getElementById(`card-${gkey}`);
            if (card) {
                card.setAttribute('data-selected-code', selectedCode);
            }

            const options = selectEl.querySelectorAll('option');
            options.forEach(opt => {
                if (opt.value === selectedCode) {
                    opt.classList.add('hidden'); 
                } else if (opt.value !== "") {
                    opt.classList.remove('hidden'); 
                }
            });

            selectEl.value = "";
        }

        // មុខងារបើកទិដ្ឋភាព Preview ដោយទាញយកទិន្នន័យពី Selected Code ជាក់ស្តែង
        function openPreview(gkey) {
            const card = document.getElementById(`card-${gkey}`);
            if (!card) return;

            const selectedCode = card.getAttribute('data-selected-code');
            if (!selectedCode) return;

            const product = rawData.find(v => v.code === selectedCode);
            if (!product) return;

            const modal = document.getElementById('image-preview');
            const name = document.getElementById('preview-name');
            const codeEl = document.getElementById('preview-code');
            const variantEl = document.getElementById('preview-variant');

            name.innerText = product.name;
            codeEl.innerText = `កូដ: ${product.code}`;

            if (product.variant && product.variant.trim() !== "") {
                variantEl.innerText = product.variant;
                variantEl.classList.remove('hidden');
            } else {
                variantEl.innerText = "";
                variantEl.classList.add('hidden');
            }

            initPreviewSlider(product.imgs);

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        // មុខងារបង្កើតប្រព័ន្ធស្លាយ និងគ្រាប់ចុច Dot
        function initPreviewSlider(imgs) {
            previewImagesList = imgs;
            currentImgIndex = 0;
            
            const slider = document.getElementById('preview-slider');
            const dotsContainer = document.getElementById('slider-dots');
            const prevBtn = document.getElementById('slide-prev');
            const nextBtn = document.getElementById('slide-next');

            slider.innerHTML = imgs.map(imgUrl => `
                <div class="w-full h-full shrink-0 snap-center flex items-center justify-center bg-white p-4">
                    <img src="${imgUrl}" class="max-w-full max-h-full rounded-2xl object-contain" onerror="this.src='https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image'">
                </div>
            `).join('');

            if (imgs.length > 1) {
                dotsContainer.innerHTML = imgs.map((_, i) => `
                    <span onclick="goToSlide(${i})" class="slider-dot w-2 h-2 rounded-full bg-gray-300 transition-all duration-300 cursor-pointer ${i === 0 ? 'bg-red-600 !w-4' : ''}"></span>
                `).join('');
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
            } else {
                dotsContainer.innerHTML = '';
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
            }

            slider.scrollLeft = 0;
        }

        // មុខងារត្រួតពិនិត្យពេលអ្នកប្រើប្រាស់អូសស្លាយលើទូរស័ព្ទ
        function handleSliderScroll() {
            const slider = document.getElementById('preview-slider');
            const width = slider.clientWidth;
            if (width === 0) return;
            const index = Math.round(slider.scrollLeft / width);
            if (index !== currentImgIndex) {
                currentImgIndex = index;
                updateSliderDots();
            }
        }

        // មុខងារផ្លាស់ប្តូរគ្រាប់ចុច Dot ទៅតាមស្លាយពិតប្រាកដ
        function updateSliderDots() {
            const dots = document.querySelectorAll('.slider-dot');
            dots.forEach((dot, i) => {
                if (i === currentImgIndex) {
                    dot.classList.add('bg-red-600', '!w-4');
                    dot.classList.remove('bg-gray-300');
                } else {
                    dot.classList.remove('bg-red-600', '!w-4');
                    dot.classList.add('bg-gray-300');
                }
            });
        }

        // មុខងាររុញស្លាយតាមរយៈប៊ូតុងព្រួញ ឆ្វេង-ស្តាំ
        function moveSlide(direction) {
            const newIndex = Math.max(0, Math.min(previewImagesList.length - 1, currentImgIndex + direction));
            goToSlide(newIndex);
        }

        // មុខងាររុញស្លាយទៅកាន់សន្ទស្សន៍ (Index) ជាក់លាក់
        function goToSlide(index) {
            const slider = document.getElementById('preview-slider');
            const width = slider.clientWidth;
            slider.scrollTo({
                left: index * width,
                behavior: 'smooth'
            });
            currentImgIndex = index;
            updateSliderDots();
        }

        function closePreview() {
            document.getElementById('image-preview').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        /* មុខងារគ្រប់គ្រង CONTACT MODAL (ថ្មី) */
        function openContactModal() {
            const modal = document.getElementById('contact-modal');
            modal.classList.remove('hidden');
            // បិទការ Scroll ផ្ទៃខាងក្រោយ
            document.body.style.overflow = 'hidden';
        }

        function closeContactModal() {
            const modal = document.getElementById('contact-modal');
            modal.classList.add('hidden');
            // បើកការ Scroll ផ្ទៃខាងក្រោយឡើងវិញ
            document.body.style.overflow = 'auto';
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
        }

        function scrollToCat(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (cat === 'all') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const safeId = getSafeId(cat);
                const target = document.getElementById(`section-${safeId}`);
                if (target) {
                    const offset = 150; 
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = target.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }
            }
        }

        // ធ្វើបច្ចុប្បន្នភាពការបង្ហាញរូបភាពតាមការជ្រើសរើស Variant
        function updateVariantDisplay(gkey, selectedCode) {
            const item = rawData.find(v => v.code === selectedCode);
            if (!item) return;
            document.getElementById(`img-${gkey}`).src = item.img;
            document.getElementById(`name-${gkey}`).innerText = item.name;
        }

        function searchProduct() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            renderBySections(q);
        }

        // Scroll Spy (ប៊ូតុងរត់តាមការ Scroll យ៉ាងត្រឹមត្រូវ និងទាក់ទាញ)
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('.category-btn');
            let current = 'all';
            const scrollTop = window.scrollY || window.pageYOffset || document.documentElement.scrollTop;

            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (scrollTop >= sectionTop - 180) {
                    current = section.getAttribute('id').replace('section-', '');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-cat') === current || (current === 'all' && link.innerText === 'ទាំងអស់')) {
                    link.classList.add('active');
                    link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        });

        fetchProducts();
    </script>
</body>
</html>
