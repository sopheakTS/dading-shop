<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DADING TikTok Shop</title>
    
    <!-- Telegram Web App SDK (បានបន្ថែមថ្មីដើម្បីឱ្យដំណើរការជា Mini App ក្នុងតេឡេក្រាម) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ប្រាប់ឱ្យ Telegram ដឹងថា Mini App ត្រៀមខ្លួនរួចរាល់
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            // ពង្រីកអេក្រង់ឱ្យធំពេញ (TikTok Style ងាយស្រួលមើល)
            window.Telegram.WebApp.expand();
        }
    </script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        
        /* កែសម្រួលរបារអូស Category ឱ្យទន់ល្មើយ និងងាយស្រួលអូសលើទូរស័ព្ទ */
        .category-scroll-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* ធ្វើឱ្យអូសទៅឆ្វេងស្តាំទន់ដៃ និងរលូនខ្លាំង */
            scrollbar-width: none; /* លាក់របារ Scroll លើ Firefox */
        }
        .category-scroll-container::-webkit-scrollbar {
            display: none; /* លាក់របារ Scroll លើ Chrome/Safari */
        }

        .category-btn.active {
            background-color: #111827;
            color: white;
            border-color: #111827;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .category-section-title {
            position: sticky;
            top: 110px;
            z-index: 20;
            background-color: #f3f4f6;
            padding: 10px 0;
        }

        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-zoom { animation: zoomIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>

<body class="pb-10">

    <!-- HEADER -->
    <header class="bg-gray-900 text-white fixed top-0 w-full z-40 shadow-lg">
        <div class="flex items-center justify-between px-4 py-3 max-w-md mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center font-bold text-sm">D</div>
                <div>
                    <h1 class="font-extrabold text-lg leading-none tracking-tight">DADING SHOP</h1>
                    <p class="text-[9px] text-gray-400 font-medium tracking-wide mt-1">មានលក់រាយនិងបោះដុំ សម្ភារៈជាង បន្ទប់ទឹក និងម៉ូទ័រ</p>
                </div>
            </div>
            <!-- ប៊ូតុងទំនាក់ទំនងផ្នែកលក់ (Random Telegram Topic Link) -->
            <button onclick="redirectToRandomTopic()" class="p-2 hover:bg-gray-800 rounded-full transition flex items-center gap-1.5 text-xs text-green-400 font-bold">
                <i class="fa-brands fa-telegram text-2xl"></i>
                <span class="hidden sm:inline">ទំនាក់ទំនងផ្នែកលក់</span>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="max-w-md mx-auto pt-20">
        
        <div class="px-4 sticky top-[60px] z-30 bg-[#f3f4f6] pb-2 pt-2">
            <div class="relative mb-3 group">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input id="search" onkeyup="searchProduct()" 
                       placeholder="ស្វែងរកតាមឈ្មោះ ឬកូដទំនិញ..." 
                       class="w-full pl-10 pr-4 py-3 rounded-2xl border-none shadow-sm bg-white focus:ring-2 focus:ring-gray-900 outline-none text-sm font-medium">
            </div>

            <!-- Category Container (កែប្រែទៅជា Class ដែលអាចអូសបានលឿន និងទន់ដៃ) -->
            <div id="category-list" class="category-scroll-container pb-1">
                <button onclick="scrollToCat('all', this)" class="category-btn active px-5 py-2 rounded-full text-sm font-medium border bg-white text-gray-600 whitespace-nowrap shadow-sm" data-cat="all">ទាំងអស់</button>
            </div>
        </div>

        <!-- កន្លែងបង្ហាញទំនិញបែងចែកតាម Section -->
        <main id="products-container" class="px-4 pb-4 mt-2 space-y-8"></main>
        
        <div id="loading" class="hidden text-center py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-gray-400 text-2xl"></i>
        </div>

        <div id="no-results" class="hidden flex-col items-center justify-center py-12 text-gray-400">
            <i class="fa-solid fa-box-open text-4xl mb-2"></i>
            <p class="text-sm">រកមិនឃើញទំនិញទេ</p>
        </div>

    </div>

    <!-- IMAGE PREVIEW MODAL -->
    <div id="image-preview" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden z-[100] flex flex-col items-center justify-center p-2">
        <button onclick="closePreview()" class="absolute top-4 right-4 text-white text-3xl hover:scale-110 transition-transform bg-black/40 w-10 h-10 rounded-full flex items-center justify-center z-50">
            <i class="fa-solid fa-xmark"></i>
        </button>
        
        <div class="w-full max-w-md flex flex-col items-center justify-center">
            <img id="preview-img" src="" class="max-w-[95%] max-h-[75vh] rounded-3xl shadow-2xl animate-zoom object-contain bg-white" onerror="this.src='https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image'">
            
            <div class="mt-4 text-center w-full max-w-sm px-4">
                <h2 id="preview-name" class="text-white text-base font-bold mb-1 line-clamp-2"></h2>
                <!-- បង្ហាញលេខកូដទំនិញនៅលើ preview -->
                <p id="preview-code" class="text-[11px] bg-red-600 text-white px-3 py-1 rounded-full w-max mx-auto mb-3 font-semibold"></p>
                
                <!-- ប៊ូតុងទំនាក់ទំនងផ្នែកលក់ (Random Topic Telegram) -->
                <button onclick="redirectToRandomTopic()" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-xl text-sm">
                    <i class="fa-brands fa-telegram text-xl"></i>
                    <span>ទំនាក់ទំនងផ្នែកលក់</span>
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-3 z-[110] transform translate-y-20 opacity-0 transition-all duration-300 w-max max-w-[90%]">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg" class="text-sm font-medium">Success</span>
    </div>

    <script>
        // Google Sheet Config
        const SHEET_ID = '1T0401xemiyUKa4i0Okhx525XA9ARl7j7TwUQLaLVJAA'; 
        const SHEET_NAME = 'Sheet1'; 

        // Telegram Topics Config
        const TELEGRAM_TOPIC_LINKS = [
            "https://t.me/c/3827031711/3",
            "https://t.me/c/3827031711/5",
            "https://t.me/c/3827031711/7",
            "https://t.me/c/3827031711/9"
        ];

        let rawData = []; 
        let groupedData = []; 

        // មុខងារសម្អាតអក្សរដកឃ្លា និងចុះបន្ទាត់ ដើម្បីបង្កើត ID ឱ្យមានសុវត្ថិភាពសម្រាប់ការ Scroll
        function getSafeId(text) {
            if (!text) return '';
            
            // ប្តូរជាអក្សរតូច សម្អាតការដកឃ្លា ការចុះបន្ទាត់ និងតួអក្សរពិសេស
            let cleanText = text.toString().toLowerCase()
                .trim()
                .replace(/[\r\n]+/g, '') // លុបការចុះបន្ទាត់
                .replace(/\s+/g, '');     // លុបការដកឃ្លាទាំងអស់
                
            let safeString = '';
            for (let i = 0; i < cleanText.length; i++) {
                let charCode = cleanText.charCodeAt(i);
                // អនុញ្ញាតតែអក្សរឡាតាំង (a-z) លេខ (0-9) និងភាសាខ្មែរ (CharCode ចន្លោះពី 6016 ដល់ 6143)
                if ((charCode >= 97 && charCode <= 122) || 
                    (charCode >= 48 && charCode <= 57) || 
                    (charCode >= 6016 && charCode <= 6143)) {
                    safeString += cleanText.charAt(i);
                }
            }
            
            return safeString || 'category';
        }

        // មុខងារកែតម្រូវតំណភ្ជាប់រូបភាពឱ្យបង្ហាញផ្ទាល់ (Direct Link) ករណីប្រើ Google Drive
        function formatImageUrl(url) {
            if (!url) return 'https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image';
            let cleanUrl = url.trim();
            
            // ករណី Link មកពី Google Drive ធម្មតា
            if (cleanUrl.includes('drive.google.com')) {
                let id = '';
                if (cleanUrl.includes('id=')) {
                    id = cleanUrl.split('id=')[1].split('&')[0];
                } else if (cleanUrl.includes('/file/d/')) {
                    id = cleanUrl.split('/file/d/')[1].split('/')[0];
                }
                if (id) {
                    return `https://docs.google.com/uc?export=download&id=${id}`;
                }
            }
            return cleanUrl;
        }

        async function fetchProducts() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                const csvText = await response.text();
                const sheetData = csvToJson(csvText);

                if (sheetData.length > 0) {
                    rawData = sheetData.map((row, index) => {
                        const rawImg = row['image link'] || row['imagelink'] || '';
                        return {
                            code: row['code'] ? row['code'].toString().trim() : index.toString(),
                            gcode: (row['g-code'] && row['g-code'].trim() !== '') ? row['g-code'].trim() : null, 
                            name: row['product name'] || row['productname'] || 'ទំនិញគ្មានឈ្មោះ',
                            price: parseFloat(row['price']?.toString().replace(/[$,]/g, '')) || 0,
                            cat: (row['category'] || 'ផ្សេងៗ').trim().replace(/[\r\n]+/g, ' '), // សម្អាតឈ្មោះ Category
                            img: formatImageUrl(rawImg),
                            variant: row['variant/size'] || row['variant'] || ''
                        };
                    });
                    
                    groupProducts();
                    generateCategoryButtons();
                    renderBySections();
                }
            } catch (error) {
                console.error("Error:", error);
                showToast("បញ្ហាទាញទិន្នន័យ សូមពិនិត្យមើលការចែករំលែក Google Sheet", true);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function groupProducts() {
            const groups = {};
            rawData.forEach(item => {
                const gkey = item.gcode ? `G-${item.gcode}` : `S-${item.code}`;
                if (!groups[gkey]) {
                    groups[gkey] = {
                        gkey: gkey,
                        isGroup: !!item.gcode,
                        baseName: item.name, 
                        cat: item.cat,
                        variants: []
                    };
                }
                groups[gkey].variants.push(item);
            });
            groupedData = Object.values(groups);
        }

        function generateCategoryButtons() {
            const catList = document.getElementById('category-list');
            
            // សម្អាតប៊ូតុងចាស់ៗ (រក្សាទុកតែ "ទាំងអស់")
            catList.innerHTML = `<button onclick="scrollToCat('all', this)" class="category-btn active px-5 py-2 rounded-full text-sm font-medium border bg-white text-gray-600 whitespace-nowrap shadow-sm" data-cat="all">ទាំងអស់</button>`;
            
            const categories = [...new Set(rawData.map(item => item.cat))];
            
            categories.forEach(cat => {
                if (cat && cat !== 'ផ្សេងៗ') {
                    const btn = document.createElement('button');
                    btn.className = "category-btn px-5 py-2 rounded-full text-sm font-medium border bg-white text-gray-600 whitespace-nowrap shadow-sm";
                    btn.innerText = cat;
                    btn.setAttribute('data-cat', getSafeId(cat)); // ប្រើប្រាស់ Safe ID
                    btn.onclick = (e) => scrollToCat(cat, e.target);
                    catList.appendChild(btn);
                }
            });
        }

        function csvToJson(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase()); 
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = [];
                let inQuote = false, currentCell = '';
                for (let char of lines[i]) {
                    if (char === '"') inQuote = !inQuote;
                    else if (char === ',' && !inQuote) { row.push(currentCell.replace(/"/g, '').trim()); currentCell = ''; }
                    else currentCell += char;
                }
                row.push(currentCell.replace(/"/g, '').trim());
                if (row.length > 1) {
                    let obj = {};
                    headers.forEach((header, index) => { if (row[index] !== undefined) obj[header] = row[index]; });
                    result.push(obj);
                }
            }
            return result;
        }

        function renderBySections(searchQuery = '') {
            const container = document.getElementById('products-container');
            const noRes = document.getElementById('no-results');
            container.innerHTML = '';
            
            const categories = [...new Set(groupedData.map(g => g.cat))];
            let hasResults = false;

            categories.forEach(cat => {
                const items = groupedData.filter(g => 
                    g.cat === cat && 
                    (g.variants.some(v => 
                        v.name.toLowerCase().includes(searchQuery) || 
                        v.code.toString().toLowerCase().includes(searchQuery) ||
                        (v.gcode && v.gcode.toString().toLowerCase().includes(searchQuery)) ||
                        v.variant.toLowerCase().includes(searchQuery)
                    ))
                );

                if (items.length > 0) {
                    hasResults = true;
                    const section = document.createElement('section');
                    section.id = `section-${getSafeId(cat)}`; // ប្រើប្រាស់ Safe ID សម្រាប់ section
                    section.innerHTML = `
                        <div class="category-section-title">
                            <h2 class="text-lg font-bold text-gray-800 border-l-4 border-red-500 pl-3">${cat}</h2>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mt-3">
                            ${items.map(g => renderProductCard(g)).join('')}
                        </div>
                    `;
                    container.appendChild(section);
                }
            });

            if (!hasResults) noRes.classList.remove('hidden');
            else noRes.classList.add('hidden');
        }

        function renderProductCard(g) {
            const firstVar = g.variants[0];
            const hasMultiple = g.variants.length > 1;

            return `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden group transition-all duration-300">
                <!-- ចុចលើរូបភាពដើម្បីពង្រីកមើល (openPreview) -->
                <div class="relative aspect-square bg-gray-100 cursor-pointer" onclick="openPreview('${firstVar.code}', '${g.gkey}')">
                    <img src="${firstVar.img}" id="img-${g.gkey}" class="w-full h-full object-cover group-hover:scale-105 transition-transform" onerror="this.src='https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image'">
                    <span id="tag-${g.gkey}" class="absolute top-2 left-2 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">${firstVar.variant || firstVar.code}</span>
                    <div class="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-magnifying-glass-plus text-white text-3xl drop-shadow-md"></i>
                    </div>
                </div>
                <div class="p-3">
                    <div class="h-10 mb-1">
                        <h3 id="name-${g.gkey}" class="text-xs font-semibold text-gray-800 line-clamp-2 leading-tight">${firstVar.name}</h3>
                    </div>
                    <div class="mb-3 ${hasMultiple ? '' : 'invisible h-8'}">
                        ${hasMultiple ? `
                        <!-- កែប្រែទៅជាបង្ហាញ Product Name (v.name) ដែលមិនទាន់បានបង្ហាញជំនួសវិញ ដើម្បីឱ្យអតិថិជនមើលដឹងច្បាស់ -->
                        <select onchange="handleDropdownChange('${g.gkey}', this)" id="select-${g.gkey}" class="w-full text-[10px] bg-red-50 border border-red-200 text-red-700 rounded-lg p-1.5 outline-none font-bold cursor-pointer hover:bg-red-100 transition-colors">
                            <option value="" disabled selected>🔍 នៅមានជម្រើសទំហំផ្សេងទៀត...</option>
                            ${g.variants.map(v => {
                                const displayText = `${v.name} [${v.code}]`;
                                return `<option value="${v.code}" ${v.code === firstVar.code ? 'class="hidden"' : ''}>${displayText}</option>`;
                            }).join('')}
                        </select>` : `<input type="hidden" id="select-${g.gkey}" value="${firstVar.code}">`}
                    </div>
                </div>
            </div>`;
        }

        // មុខងារគ្រប់គ្រងការចុចប្តូរប្រភេទនៅក្នុង Dropdown ឱ្យមានការផ្លាស់ប្តូរត្រលប់ទៅមកយ៉ាងទាក់ទាញ
        function handleDropdownChange(gkey, selectEl) {
            const selectedCode = selectEl.value;
            if (!selectedCode) return;

            // ធ្វើបច្ចុប្បន្នភាពកាតទំនិញ
            updateVariantDisplay(gkey, selectedCode);

            // រៀបចំបញ្ជី Option នៅក្នុង Dropdown ឡើងវិញ៖
            // - លាក់ Option ដែលកំពុងបង្ហាញថ្មីនេះ
            // - បង្ហាញ Option ដែលធ្លាប់បង្ហាញពីមុនឡើងវិញ
            const options = selectEl.querySelectorAll('option');
            options.forEach(opt => {
                if (opt.value === selectedCode) {
                    opt.classList.add('hidden'); // លាក់ប្រភេទដែលទើបតែបានប្តូរទៅកាន់រូបភាព
                } else if (opt.value !== "") {
                    opt.classList.remove('hidden'); // បង្ហាញប្រភេទផ្សេងៗមកវិញ
                }
            });

            // កំណត់ទម្រង់ Default ឱ្យទៅជាអត្ថបទណែនាំវិញ
            selectEl.value = "";
        }

        // មុខងារពង្រីកមើលរូបភាព និងព័ត៌មានលម្អិត
        function openPreview(code, gkey) {
            // ប្រសិនបើភ្ញៀវធ្លាប់បានចុចប្តូរ Variant នៅខាងក្រៅរួចហើយ គឺត្រូវយកកូដទំនិញដែលបានប្តូរនោះទៅបើក Preview
            const imgEl = document.getElementById(`img-${gkey}`);
            const currentTag = document.getElementById(`tag-${gkey}`)?.innerText;
            
            // ស្វែងរកទំនិញតាមរយៈ Tag ជម្រើស ឬកូដដែលកំពុងបង្ហាញនៅលើកាត
            let product = rawData.find(v => v.code === code);
            if (currentTag) {
                const foundByTag = rawData.find(v => (v.variant || v.code) === currentTag);
                if (foundByTag) product = foundByTag;
            }

            if (!product) return;

            const modal = document.getElementById('image-preview');
            const img = document.getElementById('preview-img');
            const name = document.getElementById('preview-name');
            const codeEl = document.getElementById('preview-code');

            img.src = product.img;
            name.innerText = product.name;
            codeEl.innerText = `កូដ: ${product.code}`;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function closePreview() {
            document.getElementById('image-preview').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // មុខងារ Random ជ្រើសរើសលីង Topic ហើយបើកទៅកាន់ Telegram
        function redirectToRandomTopic() {
            const randomIndex = Math.floor(Math.random() * TELEGRAM_TOPIC_LINKS.length);
            const targetLink = TELEGRAM_TOPIC_LINKS[randomIndex];
            
            showToast("កំពុងបញ្ជូនទៅកាន់ផ្នែកសេវាកម្មអតិថិជន...");
            setTimeout(() => {
                window.open(targetLink, '_blank');
            }, 500);
        }

        // មុខងារ Scroll ទៅកាន់ផ្នែក Category
        function scrollToCat(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (cat === 'all') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const safeId = getSafeId(cat);
                const target = document.getElementById(`section-${safeId}`);
                if (target) {
                    const offset = 160; 
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = target.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }
            }
        }

        function updateVariantDisplay(gkey, selectedCode) {
            const item = rawData.find(v => v.code === selectedCode);
            if (!item) return;
            document.getElementById(`img-${gkey}`).src = item.img;
            document.getElementById(`name-${gkey}`).innerText = item.name;
            document.getElementById(`tag-${gkey}`).innerText = item.variant || item.code;
        }

        // មុខងារស្វែងរកទំនិញ
        function searchProduct() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            renderBySections(q);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
        }

        // Scroll Spy (ប៊ូតុងរត់តាមការ Scroll យ៉ាងត្រឹមត្រូវ និងទាក់ទាញ)
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('.category-btn');
            let current = 'all';

            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 180) {
                    current = section.getAttribute('id').replace('section-', '');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-cat') === current || (current === 'all' && link.innerText === 'ទាំងអស់')) {
                    link.classList.add('active');
                    link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        });

        fetchProducts();
    </script>
</body>
</html>
